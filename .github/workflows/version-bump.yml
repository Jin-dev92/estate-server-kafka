name: Version Bump (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    name: Bump version & open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - name: Compute & apply version bump
        id: bump
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh
      - name: Create version bump PR
        if: steps.bump.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW="${{ steps.bump.outputs.new_version }}"
          BRANCH="chore/version-bump-${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B: 재실행 시 같은 이름 로컬 브랜치를 강제 재생성(없으면 생성)
          git checkout -B "$BRANCH"
          git add package.json
          git commit -m "chore: 버전 범프 v${NEW} [skip ci]" || echo "변경 없음(이미 해당 버전)"
          # --force: 이전 실패 실행이 남긴 동일 브랜치를 갱신(non-fast-forward 거부 회피)
          git push --force origin "$BRANCH"
          # PR이 없으면 생성, 이미 있으면 본문만 갱신(재실행 idempotent)
          gh pr create --base dev --head "$BRANCH" \
            --title "chore: 버전 범프 v${NEW}" \
            --body-file /tmp/version_bump_body.md \
            || gh pr edit "$BRANCH" --title "chore: 버전 범프 v${NEW}" --body-file /tmp/version_bump_body.md

# =============================================================================
# ⚠️ 현재 비활성화됨 — 학습용 프로젝트
#
# 이 프로젝트는 학습용이라 PR 리뷰를 GitHub Actions(OpenAI API 종량제) 대신
# 로컬 codex(ChatGPT 구독 인증, 추가 비용 0)로 수행합니다.
#   → 로컬 리뷰 실행: scripts/review-and-pr.sh
#
# 아래 잡 본문(트리거/스텝/리뷰 명령)은 E2E 검증을 마친 상태로 그대로 보존돼
# 있습니다. 상업화 단계에서 API 비용이 괜찮아지면 다음 3가지만 하면 CI 자동
# 리뷰가 다시 켜집니다:
#   1) 레포 Secret 에 결제된 OPENAI_API_KEY 등록
#   2) 아래 `on:` 의 pull_request 트리거 주석을 해제하고 workflow_dispatch 줄 제거
#   3) jobs.review 의 `if: ${{ false }}` 가드를 원래의 draft 가드로 교체
# =============================================================================

name: Codex PR Review (disabled - learning project)

on:
  # 상업화 후: 아래 두 줄 주석을 해제하고 workflow_dispatch 를 제거하면 자동 활성화
  # pull_request:
  #   types: [opened, ready_for_review]
  workflow_dispatch: {}

# 같은 PR에서 이전 실행이 돌고 있으면 취소 (workflow_dispatch 시엔 run_id 로 폴백)
concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# 최소 권한: 코드 읽기 + PR 코멘트 쓰기
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # 학습용 동안 비활성화. 리포지토리 변수 ENABLE_CODEX_CI=true 가 설정될 때만 실행됨.
    # 상업화 시: 위 pull_request 트리거를 켜고, 이 가드를 draft 가드로 교체:
    #   if: github.event.pull_request.draft == false
    if: vars.ENABLE_CODEX_CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for base diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex (headless)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Run Codex review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          # base 브랜치 대비 PR 변경분(diff)을 추출
          git diff "$BASE"...HEAD > pr.diff
          # 커스텀 보안 리뷰 프롬프트를 인자로, diff는 stdin으로 전달
          # (codex exec는 piped stdin을 <stdin> 블록으로 프롬프트에 덧붙인다)
          if cat pr.diff | codex exec \
              --dangerously-bypass-approvals-and-sandbox \
              -o review-output.md \
              "$(cat .github/codex/review-prompt.md)"; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          if [ "${{ steps.review.outputs.status }}" = "ok" ] && [ -s review-output.md ]; then
            {
              echo "## 🤖 Codex 자동 리뷰"
              echo
              cat review-output.md
            } > comment.md
          else
            {
              echo "## 🤖 Codex 자동 리뷰"
              echo
              echo "⚠️ 리뷰 생성에 실패했습니다. Actions 로그를 확인해 주세요."
            } > comment.md
          fi
          gh pr comment "$PR" --body-file comment.md
